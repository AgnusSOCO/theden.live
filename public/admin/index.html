<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Blog Admin - The Den</title>
  <link href="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.css" rel="stylesheet" />
  <style>
    body { 
      background: #0a0a0a; 
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'AgnusSOCO/theden.live',
          branch: 'main',
          base_url: window.location.origin,
          auth_endpoint: '/api/auth'
        },
        load_config_file: false,
        media_folder: 'public/images/uploads',
        public_folder: '/images/uploads',
        collections: [
          {
            name: 'blog',
            label: 'Blog Posts',
            folder: 'content/blog',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Publish Date', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: 'Excerpt', name: 'excerpt', widget: 'text' },
              { label: 'Tags', name: 'tags', widget: 'list', default: ['challenge'] },
              { label: 'Body', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'settings',
            label: 'Challenge Settings',
            files: [
              {
                label: 'Challenge Stats',
                name: 'stats',
                file: 'content/settings/stats.json',
                fields: [
                  { label: 'Starting Balance', name: 'starting', widget: 'number', value_type: 'float', default: 1000 },
                  { label: 'Current Balance', name: 'current', widget: 'number', value_type: 'float', default: 1000 },
                  { label: 'Goal', name: 'goal', widget: 'number', value_type: 'float', default: 10000 }
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
