backend:
  name: github
  repo: AgnusSOCO/theden.live
  branch: main
  base_url: https://decap-oauth.netlify.app

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", default: ["challenge"] }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Challenge Settings"
    files:
      - label: "Challenge Stats"
        name: "stats"
        file: "content/settings/stats.json"
        fields:
          - { label: "Starting Balance", name: "starting", widget: "number", value_type: "float", default: 1000 }
          - { label: "Current Balance", name: "current", widget: "number", value_type: "float", default: 1000 }
          - { label: "Goal", name: "goal", widget: "number", value_type: "float", default: 10000 }
